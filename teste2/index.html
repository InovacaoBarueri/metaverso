
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Meu Metaverso</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Carregando modelo 3D --><a-assets>
        <a-asset-item id="ambiente3D" src="ambiente.glb"></a-asset-item>
      </a-assets>

      <a-entity gltf-model="#ambiente3D" position="0 0 0" scale="1 1 1"></a-entity>

      <!-- Tela com vídeo do YouTube --><a-entity geometry="primitive: plane; height: 3; width: 5"position="0 2 -5"material="shader: flat; src: #video-texture">
      </a-entity>

      <video id="video-texture" autoplay loop crossOrigin="anonymous" webkit-playsinline playsinline>
        <source src="./Aula-teste-metaverso-2025.mp4" type="video/mp4">
      </video>

      <!-- Câmera do usuário --><a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
